services:
  - type: web
    name: chalked
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m backend.chalked_backend.server
    healthCheckPath: /api/health
    disk:
      name: chalked-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: CHALKED_ENV
        value: production
      - key: CHALKED_HOST
        value: 0.0.0.0
      - key: CHALKED_DB
        value: /data/chalked.sqlite3
      - key: CHALKED_PUBLIC_URL
        value: https://playchalked.com
      - key: CHALKED_ALLOWED_ORIGINS
        value: https://playchalked.com,https://www.playchalked.com,https://chalked-srnz.onrender.com
      - key: CHALKED_CRON_SECRET
        generateValue: true
      - key: CHALKED_ADMIN_HANDLES
        sync: false
      - key: CHALKED_REQUIRE_OBJECT_STORAGE
        value: 1
      - key: CHALKED_MAIL_FROM
        sync: false
      - key: CHALKED_SMTP_HOST
        sync: false
      - key: CHALKED_SMTP_PORT
        value: 587
      - key: CHALKED_SMTP_USERNAME
        sync: false
      - key: CHALKED_SMTP_PASSWORD
        sync: false
      - key: CHALKED_SMTP_TLS
        value: 1
      - key: CHALKED_UPLOAD_BUCKET
        sync: false
      - key: CHALKED_UPLOAD_ENDPOINT
        sync: false
      - key: CHALKED_UPLOAD_ACCESS_KEY_ID
        sync: false
      - key: CHALKED_UPLOAD_SECRET_ACCESS_KEY
        sync: false
      - key: CHALKED_UPLOAD_REGION
        value: auto
      - key: CHALKED_UPLOAD_PUBLIC_URL
        sync: false
      - key: CHALKED_UPLOAD_PREFIX
        value: uploads
      - key: CHALKED_BACKUP_PREFIX
        value: backups

  - type: cron
    name: chalked-settlement
    runtime: python
    schedule: "*/5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m backend.chalked_backend.jobs settle
    envVars:
      - key: CHALKED_PUBLIC_URL
        sync: false
      - key: CHALKED_CRON_SECRET
        sync: false

  - type: cron
    name: chalked-backup
    runtime: python
    schedule: "17 8 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m backend.chalked_backend.jobs backup
    envVars:
      - key: CHALKED_PUBLIC_URL
        sync: false
      - key: CHALKED_CRON_SECRET
        sync: false
