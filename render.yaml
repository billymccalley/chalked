services:
  - type: web
    name: chalked
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m backend.chalked_backend.server
    healthCheckPath: /api/health
    envVars:
      - key: CHALKED_ENV
        value: production
      - key: CHALKED_HOST
        value: 0.0.0.0
      - key: CHALKED_DB
        value: /tmp/chalked.sqlite3
      - key: CHALKED_PUBLIC_URL
        value: https://chalked.onrender.com
      - key: CHALKED_ALLOWED_ORIGINS
        value: https://chalked.onrender.com
      - key: CHALKED_CRON_SECRET
        generateValue: true
      - key: CHALKED_MAIL_FROM
        sync: false
      - key: CHALKED_SMTP_HOST
        sync: false
      - key: CHALKED_SMTP_PORT
        value: 587
      - key: CHALKED_SMTP_USERNAME
        sync: false
      - key: CHALKED_SMTP_PASSWORD
        sync: false
      - key: CHALKED_SMTP_TLS
        value: 1
